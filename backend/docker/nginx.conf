events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Taille max des uploads
    client_max_body_size 100M;

    server {
        listen 80;
        server_name localhost;

        # Racine du projet Laravel (dossier public/)
        root /var/www/public;
        index index.php index.html;

        # Logs
        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log;

        # Toutes les requêtes passent par index.php (routing Laravel)
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Traitement des fichiers PHP via PHP-FPM
        # "backend" correspond au nom du service dans docker-compose
        location ~ \.php$ {
            fastcgi_pass backend:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;

            # Headers utiles pour Laravel (IP réelle, HTTPS, etc.)
            fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
            fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        }

        # Interdire l'accès aux fichiers cachés (.env, .git, etc.)
        location ~ /\. {
            deny all;
        }
    }
}
